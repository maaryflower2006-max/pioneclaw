name: DeepSeek PR Review

# ⚠️ SECURITY: This workflow uses pull_request_target, which runs in the
# base repository context with access to secrets and write permissions.
# DO NOT checkout the PR branch or execute untrusted code from the PR.
# Only use gh API commands (e.g. gh pr diff) to read PR content safely.
# For details: https://securitylab.github.com/research/github-actions-preventing-pwn-requests
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - '**.svg'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.webp'
      - '**.ico'
      - '**/*.lock'
      - '**/__snapshots__/**'

permissions:
  contents: read
  pull-requests: write

env:
  # 用于识别已有评论的 bot 用户名。
  # 默认使用 GITHUB_TOKEN 时为 "github-actions[bot]"；
  # 若改用 PAT，需同步修改此变量。
  REVIEW_BOT_LOGIN: github-actions[bot]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR diff
        run: |
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" > pr.diff

          # 如果 diff 为空，跳过审查
          if [ ! -s pr.diff ]; then
            echo "No code files changed. Skipping review."
            echo "SKIP_REVIEW=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # 按行截断，保留前 2000 行，防止 token 超限
          total_lines=$(wc -l < pr.diff)
          if [ "$total_lines" -gt 2000 ]; then
            head -n 2000 pr.diff > pr_trimmed.diff
            echo "" >> pr_trimmed.diff
            echo "[... diff truncated after 2000 lines, total $total_lines lines]" >> pr_trimmed.diff
          else
            cp pr.diff pr_trimmed.diff
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Ask DeepSeek to review
        if: env.SKIP_REVIEW != 'true'
        run: |
          python3 <<'PY'
          import os
          import requests

          api_key = os.environ["DEEPSEEK_API_KEY"]

          with open("pr_trimmed.diff", "r", encoding="utf-8", errors="ignore") as f:
              diff = f.read()

          prompt = (
              "你是一个严格但务实的资深代码审查员，隶属于 PioneClaw 安全研发团队。"
              "请审查下面的 GitHub PR diff。\n\n"
              "重点关注（按优先级排序）：\n"
              "1. 安全风险：SQL 注入、XSS、命令注入、权限绕过、敏感信息泄露、CSRF\n"
              "2. API Breaking Change：接口签名变更、返回值格式变化、废弃字段未兼容\n"
              "3. 明显 bug：空指针、数组越界、异步竞态、资源泄漏\n"
              "4. 并发与边界：线程安全、边界条件、空值处理、异常分支\n"
              "5. 性能问题：N+1 查询、大对象拷贝、阻塞操作、内存泄漏\n"
              "6. 测试覆盖：新增逻辑是否缺少单元测试、边界场景未覆盖\n"
              "7. 可维护性：魔法数字、重复代码、命名不清晰、过度设计\n\n"
              "输出要求（必须严格遵循以下结构）：\n\n"
              '## 审查意见（Inline Review）\n'
              '按文件分组，每条意见使用统一格式（方便后续转为 GitHub inline review）：\n\n'
              '```\n'
              '### {严重程度} | {文件路径}:{起始行}-{结束行}\n'
              '\n'
              '- **问题**：一句话概括\n'
              '- **影响**：为什么这是个问题\n'
              '- **建议**：具体怎么改，可附代码片段\n'
              '```\n\n'
              '示例：\n'
              '```\n'
              '### P2 | backend/app/core/audit.py:52-58\n'
              '\n'
              '- **问题**：目录创建失败后未设置禁用标志，后续写入会在无效路径上操作\n'
              '- **影响**：审计日志功能不可用时可能导致主业务流程因未捕获的 FileNotFoundError 崩溃\n'
              '- **建议**：在 __init__ 中捕获异常后设置 self._disabled = True，所有公开写入方法开头检查该标志\n'
              '```\n\n'
              '规则：\n'
              '- 每条意见必须包含准确的文件路径和行号范围（从 diff 中定位）\n'
              '- 按严重程度排序：P0 阻塞 → P1 严重 → P2 重要 → P3 建议\n'
              '- 只评论与本次 diff 直接相关的代码\n'
              '- 如果没有问题，保留本章节标题并写"未发现与本次 diff 相关的审查意见"\n\n'
              '## 总结（Summary）\n'
              '- 用 2-3 句话概括整体评价\n'
              '- 明确给出是否建议合并（通过 / 有条件通过 / 不通过）\n'
              '- 如有 P0/P1 问题，必须说明阻塞原因\n\n'
              "PR diff:\n\n"
              f"```diff\n{diff}\n```\n"
          )

          payload = {
              "model": "deepseek-v4-pro",
              "messages": [
                  {
                      "role": "system",
                      "content": "你是一个专业的 GitHub Pull Request 代码审查助手，专注于安全、性能和可维护性。"
                  },
                  {
                      "role": "user",
                      "content": prompt
                  }
              ],
              "stream": False,
              "reasoning_effort": "high",
              "thinking": {"type": "enabled"}
          }

          try:
              resp = requests.post(
                  "https://api.deepseek.com/chat/completions",
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json"
                  },
                  json=payload,
                  timeout=120
              )
              resp.raise_for_status()
              data = resp.json()

              choices = data.get("choices", [])
              if not choices or not isinstance(choices, list):
                  raise ValueError(f"API 响应缺少 choices: {data}")

              message = choices[0].get("message", {})
              review = message.get("content", "")
              if not review:
                  raise ValueError(f"API 响应内容为空: {data}")

          except Exception as e:
              review = f"**DeepSeek 审查调用失败**\n\n错误信息：{e}\n\n请检查 API Key、网络连接及 DeepSeek 服务状态。"

          with open("review.md", "w", encoding="utf-8") as f:
              f.write("## DeepSeek PR 自动审查\n\n")
              f.write(review)
              f.write("\n\n---\n")
              f.write("_由 GitHub Actions + DeepSeek 自动生成，请人工确认后采纳。_\n")
          PY
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Post or update review comment
        run: |
          bot_login="${REVIEW_BOT_LOGIN}"

          # 查找已有的 DeepSeek 审查评论
          existing_comment_id=$(
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.user.login == \"$bot_login\" and (.body | startswith(\"## DeepSeek PR 自动审查\"))) | .id" \
              | head -n 1
          )

          if [ "$SKIP_REVIEW" = "true" ]; then
            skip_body="## DeepSeek PR 自动审查\n\n"
            skip_body+="本次变更无代码文件需要审查（仅 lockfile、生成文件、图片等被修改）。\n\n"
            skip_body+="---\n"
            skip_body+="_由 GitHub Actions + DeepSeek 自动生成。_"
            echo "$skip_body" > review.md
          fi

          if [ -n "$existing_comment_id" ]; then
            # 更新已有评论
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$existing_comment_id" \
              --method PATCH \
              --raw-field body="$(cat review.md)"
            echo "Updated existing review comment #$existing_comment_id"
          else
            # 创建新评论
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file review.md
            echo "Created new review comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SKIP_REVIEW: ${{ env.SKIP_REVIEW }}
